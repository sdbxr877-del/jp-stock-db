name: FRED Macro Indicators Update

on:
  schedule:
    - cron: '0 8 * * 2-6'   # 17:00 JST Tue-Sat (previous US business day close)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry run mode (no BQ write)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  id-token: write

jobs:
  update-fred:
    name: FRED Indicators Update
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/874756684682/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'jp-stock-db-sa@project-3eaadce9-f852-40e1-932.iam.gserviceaccount.com'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas google-cloud-bigquery

      - name: Syntax check G1
        run: |
          python -m py_compile scripts/fred_ingest.py
          echo G1 PASS

      - name: Secrets audit G2
        run: |
          hits=$(grep -nE 'print.*token|print.*key|print.*secret|print.*password' scripts/fred_ingest.py | wc -l)
          if [ "$hits" -gt 0 ]; then echo G2 FAIL; exit 1; fi
          echo G2 PASS

      - name: Run FRED ingest
        run: |
          ARGS=""
          DRY="${{ github.event.inputs.dry_run }}"
          if [ "$DRY" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          echo "running: python scripts/fred_ingest.py $ARGS"
          set -o pipefail
          python scripts/fred_ingest.py $ARGS 2>&1 | tee fred_update.log
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GCP_PROJECT_ID: project-3eaadce9-f852-40e1-932

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fred-update-log-${{ github.run_id }}
          path: fred_update.log
          retention-days: 30
